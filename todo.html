<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>My Tasks</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  width: 350px;
  margin: 40px auto;
}

input {
  width: 65%;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 8px;
  border: none;
  border-radius: 5px;
  background: #38bdf8;
  color: white;
  cursor: pointer;
}

h3 {
  margin-top: 20px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #1e293b;
  margin: 8px 0;
  padding: 10px;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
}
</style>

</head>
<body>

<div class="container">
  <h2>📋 Mening Vazifalarim</h2>

  <input id="taskInput" placeholder="Vazifa yoz...">
  <button onclick="addTask()">Qo‘shish</button>

  <h3>⏳ Bajarilmagan</h3>
  <ul id="todoList"></ul>

  <h3>✅ Bajarilgan</h3>
  <ul id="doneList"></ul>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let text = input.value;

  if (text === "") return;

  let li = document.createElement("li");
  li.innerHTML = `
    <span>${text}</span>
    <div>
      <button onclick="markDone(this)">✔</button>
      <button onclick="deleteTask(this)">❌</button>
    </div>
  `;

  document.getElementById("todoList").appendChild(li);
  input.value = "";
}

function markDone(btn) {
  let li = btn.parentElement.parentElement;
  btn.remove(); // ✔ tugma yo‘qoladi
  document.getElementById("doneList").appendChild(li);
}

function deleteTask(btn) {
  btn.parentElement.parentElement.remove();
}
</script>

</body>
</html>
